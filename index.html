<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hello from Vercel — Nechama's test deploy</title>
<style>
  :root {
    --cream: #f0eee6;
    --ink: #151514;
    --accent: #a14a3c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--cream);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: var(--ink);
    padding: 2rem;
  }
  .card {
    max-width: 540px;
    text-align: center;
  }
  h1 {
    font-family: Georgia, 'Source Serif 4', serif;
    font-size: 3rem;
    line-height: 1.1;
    margin: 0 0 1rem;
    letter-spacing: -0.02em;
  }
  .accent { color: var(--accent); }
  p {
    font-size: 1.15rem;
    line-height: 1.6;
    margin: 0.5rem 0;
  }
  .stamp {
    margin-top: 2rem;
    font-family: ui-monospace, monospace;
    font-size: 0.85rem;
    color: #6e6a60;
    letter-spacing: 0.04em;
  }
  .pulse {
    display: inline-block;
    width: 10px;
    height: 10px;
    background: var(--accent);
    border-radius: 50%;
    margin-right: 8px;
    animation: pulse 1.6s infinite;
    vertical-align: middle;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }
</style>
</head>
<body>
  <div class="card">
    <h1>Hello from <span class="accent">Vercel</span>.</h1>
    <p>This page lives on the internet. Anyone with the URL can see it.</p>
    <p>It went from a file on a laptop to a public URL in about sixty seconds.</p>
    <div class="stamp"><span class="pulse"></span>Deployed via GitHub → Vercel auto-deploy</div>
  </div>
</body>
</html>
